<!DOCTYPE html>
<html>
<head>
    <title>Candidates</title>
    <style>
body { font-family: Arial; margin: 0; background: #f4f6f9; }

.navbar {
    background: #2c3e50;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
}

.navbar-left {
    font-size: 18px;
    font-weight: bold;
}

.navbar-right {
    display: flex;
    align-items: center;
}

.navbar-right span {
    margin-right: 15px;
}

.navbar a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="navbar-left">Voting System</div>

    <div class="navbar-right">
        <span>Hi, {{ request.user.username }}</span>
        <a href="{% url 'dashboard' %}">Home</a>
        <a href="/elections/">Elections</a>
        <a href="{% url 'update_profile' %}">Update Profile</a>
        <a href="{% url 'logout' %}">Logout</a>
    </div>
</div>

<div style="padding:30px;">
    <h2>{{ election.title }}</h2>

    {% if already_voted %}
        <p style="color:green;">You already voted</p>
    {% endif %}

    <ul>
        {% for candidate in candidates %}
        <li>
            {{ candidate.name }}

            {% if not already_voted %}
                <a href="{% url 'vote' candidate.id %}">Vote</a>
            {% endif %}
        </li>
        {% endfor %}
    </ul>

    <a href="{% url 'election_list' %}">Back</a>
</div>

</body>
</html>
