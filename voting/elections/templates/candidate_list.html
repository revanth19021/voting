<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandidateList</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #ffffff);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 60px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f5f5f5;
            margin: 10px 0;
            padding: 12px;
            border-radius: 8px;
            transition: 0.3s;
        }

        li:hover {
            background: #2196f3;
            color: white;
            transform: translateX(5px);
        }

        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            background: #2196f3;
            color: white;
            padding: 10px;
            border-radius: 8px;
        }

        a:hover {
            background: #0b7dda;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Candidates for {{ election.title }}</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<ul>
    {% for candidate in candidates %}
        <li>
            {{ candidate.name }}
            <a href="{% url 'vote' candidate.id %}">Vote</a>
        </li>
    {% endfor %}
</ul>

<a href="{% url 'election_list' %}">Back</a>
    </div>
</body>
</html>
