<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election List</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f0f4ff, #ffffff);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 700px;
            margin: 60px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 12px 0;
        }

        a {
            display: block;
            text-decoration: none;
            background: #4CAF50;
            color: white;
            padding: 14px;
            border-radius: 10px;
            transition: 0.3s;
            font-size: 16px;
        }

        a:hover {
            background: #388e3c;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Available Elections</h2>

        <ul>
            {% for election in elections %}
                <li>
                    <a href="{% url 'candidate_list' election.id %}">
                        {{ election.title }}
                    </a>
                </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
