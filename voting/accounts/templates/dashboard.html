<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        /* 🔷 Navbar */
        .navbar {
            background: #2c3e50;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .navbar-left {
            font-size: 18px;
            font-weight: bold;
        }

        .navbar-right {
            display: flex;
            align-items: center;
        }

        .navbar-right span {
            margin-right: 15px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-weight: bold;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        /* 🔷 Container */
        .dashboard-container {
            width: 400px;
            margin: 80px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #333;
        }

        .username {
            font-weight: bold;
            color: #2196f3;
        }

        .role {
            font-weight: bold;
            color: #4CAF50;
        }

        /* 🔷 Buttons */
        .btn {
            display: block;
            margin: 15px auto;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            width: 70%;
        }

        .btn-election {
            background: #2196f3;
        }

        .btn-logout {
            background: #f44336;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <!-- 🔷 Navbar -->
    <div class="navbar">
        <div class="navbar-left">Voting System</div>

        <div class="navbar-right">
            <span>Hi, {{ request.user.username }}</span>
            <a href="{% url 'dashboard' %}">Home</a>
            <a href="/elections/">Elections</a>
            <a href="{% url 'update_profile' %}">Update Profile</a>
            <a href="{% url 'about'%}">About</a>
            <a href="{% url 'contact' %}">Contact</a>
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </div>

    <div class="dashboard-container">
        <h2>Dashboard</h2>

        <p>Welcome <span class="username">{{ request.user.username }}</span></p>
        <p>Your role: <span class="role">{{ profile.role }}</span></p>

        <!-- 🔥 Actions -->
        <a href="/elections/" class="btn btn-election">View Elections</a>

        <a href="{% url 'logout' %}" class="btn btn-logout">Logout</a>
    </div>

</body>
</html>
