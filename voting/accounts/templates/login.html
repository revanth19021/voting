<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #dfe9f3, #ffffff);
            margin: 0;
        }

        /* 🔷 Navbar */
        .navbar {
            background: #2c3e50;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            color: white;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-weight: bold;
        }

        /* 🔷 Login Box */
        .login-container {
            width: 350px;
            margin: 80px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 95%;
            padding: 10px;
            background: #2196f3;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .error {
            color: red;
        }

        .register-btn {
            display: block;
            margin-top: 10px;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border-radius: 8px;
            text-decoration: none;
        }

        .admin-btn {
            background: #f44336;
        }
    </style>
</head>

<body>

<!-- 🔷 Navbar (FIXED POSITION) -->
<div class="navbar">
    <div><strong>Voting System</strong></div>
    <div>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'register' %}">Register</a>
        <a href="/elections/">Elections</a>
    </div>
</div>

<!-- 🔷 Login Form -->
<div class="login-container">
    <h2>Login</h2>

    <form method="post">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    
    <a href="{% url 'register' %}" class="register-btn">
        New User? Register Here
    </a>

    <a href="{% url 'login' %}?role=admin" class="register-btn admin-btn">
        Admin Login
    </a>
</div>

</body>
</html>
